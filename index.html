<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MOABOM">
<meta name="theme-color" content="#6c63ff">
<meta name="description" content="웹툰 모아보기 앱">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MOABOM</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--sub:#9ca3af;--border:#e5e7eb;--accent:#6c63ff;--al:#ede9ff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto}

/* ── HEADER ── */
.hdr{background:var(--card);padding:13px 16px 9px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border)}
.hdr-top{display:flex;flex-direction:row;align-items:center;justify-content:space-between;margin-bottom:10px;width:100%}
.logo{font-size:18px;font-weight:900;letter-spacing:2px;color:var(--text);flex-shrink:0}
.logo span{color:var(--accent)}
.hdr-btns{display:flex;gap:6px;align-items:center;flex-shrink:0}
.logo{font-size:18px;font-weight:900;letter-spacing:2px;color:var(--text)}
.logo span{color:var(--accent)}
.hdr-date{font-size:11px;color:var(--sub);margin-right:auto;align-self:center;line-height:1}
.hdr-btns{display:flex;gap:6px;align-items:center}
.hdr-icon{width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--sub)}

/* ── DAY TABS ── */
.day-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.dt{flex:1;min-width:0;padding:7px 4px;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;text-align:center;position:relative;border-radius:0}
.dt.active{color:var(--accent);font-weight:800}
.dt.active::after{content:'';position:absolute;bottom:-1px;left:10%;right:10%;height:2.5px;background:var(--accent);border-radius:2px}
.dt.today-tab{color:var(--text)}
.dt.today-tab.active{color:var(--accent)}

/* ── CONTENT ── */
.content{padding:10px 12px 100px}

/* ── STATUS FILTER ── */
.sf-row{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;align-items:center}
.sf-row::-webkit-scrollbar{display:none}
.sfb{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--sub)}
.sfb.on{background:var(--text);color:#fff;border-color:var(--text)}
.cf-icon-btn{flex-shrink:0;width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);margin-left:auto}
.cf-icon-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── PLATFORM CARD ── */
.plat-card{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.plat-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 13px 9px;border-bottom:1px solid transparent}
.plat-hdr.has{border-bottom-color:var(--border)}
.plat-l{display:flex;align-items:center;gap:7px}
.plat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.plat-nm{font-size:13px;font-weight:700;line-height:1}
.plat-cnt{font-size:10px;color:var(--sub);background:var(--bg);padding:2px 6px;border-radius:8px;line-height:1;vertical-align:middle}
.plat-r{display:flex;align-items:center;gap:6px}
.plat-list-btn{border:none;background:transparent;font-size:11px;color:var(--sub);cursor:pointer;padding:2px 4px;text-decoration:underline;text-underline-offset:2px}
.plat-add{border:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;color:#fff;white-space:nowrap}

/* ── SUMMARY MODAL ── */
.sum-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:20px}
.sum-overlay.open{display:flex}
.sum-modal{background:var(--card);border-radius:20px;width:100%;max-width:400px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
.sum-hdr{padding:18px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.sum-hdr h3{font-size:16px;font-weight:800}
.sum-close{border:none;background:none;font-size:20px;cursor:pointer;color:var(--sub);line-height:1}
.sum-plat-tabs{display:flex;gap:8px;padding:12px 16px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border)}
.sum-plat-tabs::-webkit-scrollbar{display:none}
.spt{flex-shrink:0;padding:5px 14px;border-radius:18px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub);background:#fff}
.spt.on{color:#fff;border-color:transparent}
.sum-body{overflow-y:auto;padding:12px 16px 20px;flex:1}
.sum-day-sec{margin-bottom:14px}
.sum-day-lbl{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;background:var(--bg);padding:3px 10px;border-radius:10px;margin-bottom:7px}
.sum-day-cnt{font-size:11px;color:var(--sub);font-weight:400}
.sum-list{background:var(--bg);border-radius:10px;overflow:hidden}
.sum-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border)}
.sum-item:last-child{border-bottom:none}
.sum-item-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.sum-item-day{font-size:11px;color:var(--sub);flex-shrink:0}
.sum-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sum-item-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-left:6px}
.sib-10day{background:var(--al);color:var(--accent)}
.sib-nrest{background:var(--al);color:var(--accent)}
.sib-hold{background:#fef3c7;color:#92400e}
.sib-done{background:#e5e7eb;color:#4b5563}
.sib-return{background:#fce7f3;color:#9d174d}

/* ── CARD GRID - horizontal scroll ── */
.wt-grid{display:flex;flex-direction:row;gap:7px;padding:8px 8px 10px;overflow-x:auto;scrollbar-width:none}
.wt-grid::-webkit-scrollbar{display:none}

.wt-card{border-radius:10px;overflow:visible;background:var(--bg);position:relative;user-select:none;flex-shrink:0;width:calc((100% - 8px*3) / 3)}
/* 10일 연재 강조 테두리 */
.wt-card.is-10day{outline:1.5px solid rgba(108,99,255,.3);outline-offset:1px}

.wt-thumb{aspect-ratio:1/1;border-radius:10px 10px 0 0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(145deg,#f5f5fa,#ebebf5)}
.wt-thumb img{width:100%;height:100%;object-fit:cover}

/* ··· menu button top-right */
.card-menu-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.88);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.card-menu-btn svg{width:11px;height:11px;fill:var(--sub)}

/* ep badge */
.ep-badge{position:absolute;bottom:5px;right:5px;background:rgba(26,26,46,.82);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap}

/* top-left badge: 10일/완결/휴재/복귀/nrest */
.tl-badge{position:absolute;top:0;left:0;font-size:10px;font-weight:700;padding:3px 6px;border-radius:6px 0 6px 0;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.badge-10day{background:rgba(108,99,255,.14);color:var(--accent)}
.badge-done{background:rgba(100,100,100,.75);color:#fff}
.badge-hold{background:rgba(180,90,0,.78);color:#fff}
.badge-return{background:rgba(157,23,77,.75);color:#fff}
.badge-nrest{background:rgba(108,99,255,.14);color:var(--accent)}

/* card body */
.wt-body{padding:8px 7px 10px;background:var(--card);border-radius:0 0 10px 10px}
.wt-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.wt-bottom{display:flex;align-items:center;justify-content:space-between;gap:3px}
.wt-last{font-size:9px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ep-inc{border:none;border-radius:6px;background:#ede9ff;color:var(--accent);font-size:11px;font-weight:700;padding:2px 7px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ep-inc:active{transform:scale(.9)}

/* empty */
.empty-state{padding:18px;text-align:center;color:var(--sub)}
.empty-state p{font-size:11px;line-height:1.6}

.total-bar{text-align:center;padding:10px;color:var(--sub);font-size:11px}
.total-bar strong{color:var(--text)}

/* ── CARD CONTEXT MENU ── */
.ctx-menu{display:none;position:fixed;z-index:600;background:var(--card);border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.18);width:220px;overflow:hidden;animation:fadeIn .12s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ctx-menu.open{display:block}
.ctx-title{padding:12px 16px 10px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctx-item{display:block;width:100%;padding:12px 16px;text-align:left;border:none;background:none;font-size:13px;font-family:inherit;cursor:pointer;color:var(--text)}
.ctx-item:hover{background:var(--bg)}
.ctx-item.danger{color:#ef4444}
.ctx-close{display:block;width:100%;padding:11px 16px;text-align:center;border:none;border-top:1px solid var(--border);background:none;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub)}

/* ── BACKUP MENU ── */
.bk-menu{display:none;position:fixed;z-index:600;background:var(--card);border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.18);width:180px;overflow:hidden;animation:fadeIn .12s ease}
.bk-menu.open{display:block}
.bk-item{display:block;width:100%;padding:13px 16px;text-align:left;border:none;background:none;font-size:13px;font-family:inherit;cursor:pointer;color:var(--text)}
.bk-item:hover{background:var(--bg)}
.bk-close{display:block;width:100%;padding:11px 16px;text-align:center;border:none;border-top:1px solid var(--border);background:none;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub)}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:24px;width:50px;height:50px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(108,99,255,.45);z-index:150;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.94)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:20px 17px 40px;width:100%;max-width:430px;max-height:93vh;overflow-y:auto;animation:su .22s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:17px;font-weight:800;margin-bottom:16px}
.mtabs{display:flex;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:14px}
.mtab{flex:1;padding:7px;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub)}
.mtab.on{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}

.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#fff}
.fi:focus{border-color:var(--accent)}
select.fi{appearance:none;cursor:pointer}
textarea.fi{resize:none;min-height:60px}

.dc-row{display:flex;flex-wrap:wrap;gap:6px}
.dc input{display:none}
.dc label{padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub);transition:all .12s}
.dc input:checked+label{background:var(--text);color:#fff;border-color:var(--text)}
.dc.disabled label{opacity:.3;cursor:not-allowed;pointer-events:none}

.pr-row{display:flex;flex-wrap:wrap;gap:6px}
.pr input{display:none}
.pr label{padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub)}
.pr input:checked+label{background:var(--accent);color:#fff;border-color:var(--accent)}

/* thumb type toggle */
.thumb-toggle{display:flex;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:10px}
.tt-btn{flex:1;padding:7px;border:none;background:transparent;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:var(--sub)}
.tt-btn.on{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}

.em-row{display:flex;align-items:center;gap:8px}
.em-disp{width:44px;height:44px;border-radius:9px;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0}
.em-grid{display:none;flex-wrap:wrap;gap:4px;margin-top:7px;background:var(--bg);border-radius:11px;padding:9px;max-height:150px;overflow-y:auto}
.em-grid.open{display:flex}
.em-opt{width:34px;height:34px;border-radius:7px;border:none;background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.em-opt.sel{background:var(--al)}

.img-upload-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;color:var(--sub);font-size:12px;position:relative}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-preview{width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:8px;display:none}

.hint-box{border-radius:10px;padding:10px 12px;margin-top:7px;display:none;font-size:11px;line-height:1.6}
.hint-box.show{display:block}
.hint-yellow{background:#fff8e7;border:1.5px solid #fbbf24;color:#92400e}
.hint-yellow strong{color:#e65100}
.hint-purple{background:#f8f0ff;border:1.5px solid #c4b5fd;color:#5b21b6}
.hint-purple strong{color:#5b21b6}
.hint-green{background:#f0fff4;border:1.5px solid #6ee7b7;color:#065f46}
.hint-pink{background:#fdf2f8;border:1.5px solid #f9a8d4;color:#9d174d}

.cycle-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.cycle-row .fi{flex:1;min-width:70px;padding:8px 10px;font-size:13px}
.cycle-filter-row{display:flex;align-items:center;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.cycle-filter-row::-webkit-scrollbar{display:none}
.cf-btn{flex-shrink:0;padding:3px 10px;border-radius:14px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:var(--sub)}
.cf-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cf-icon-btn{flex-shrink:0;width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);margin-left:auto}
.cf-btns{display:none;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1}
.cf-btns::-webkit-scrollbar{display:none}

.mactions{display:flex;gap:9px;margin-top:20px}
.btn-c{flex:1;padding:13px;border:none;background:var(--bg);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;color:var(--sub)}
.btn-s{flex:2;padding:13px;border:none;background:var(--text);color:#fff;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}

.ba{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;min-height:55px;resize:none;outline:none}
.ba:focus{border-color:var(--accent)}

/* dim removed */

/* ── WALLET ── */
.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.w-item-a{background:var(--card);border-radius:13px;padding:12px 7px 11px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.w-item-a .wi-dot{width:6px;height:6px;border-radius:50%;margin:0 auto 5px}
.w-item-a .wi-lbl{font-size:10px;color:var(--sub);margin-bottom:3px}
.w-item-a .wi-amt{font-size:14px;font-weight:800;cursor:pointer;line-height:1.2}
.w-item-a .wi-sub{font-size:9px;color:var(--sub);margin-top:2px}
.w-item-a .wi-exp{font-size:9px;color:#ef4444;font-weight:600;margin-top:2px;min-height:13px}
.w-item-a .wi-btn{margin-top:6px;width:100%;padding:4px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:9px;font-weight:600;cursor:pointer;color:var(--sub)}
.w-item-a .wi-btn.done{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}

/* ── WALLET MODAL ── */
.wallet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center}
.wallet-overlay.open{display:flex}
.wallet-modal{background:var(--card);border-radius:22px 22px 0 0;padding:18px 14px 36px;width:100%;max-width:430px;animation:su .22s ease}
.wallet-modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.wallet-modal-hdr h3{font-size:16px;font-weight:800}
.wallet-modal-close{border:none;background:none;font-size:20px;cursor:pointer;color:var(--sub);line-height:1}

/* wallet edit modal */
.we-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px}
.we-overlay.open{display:flex}
.we-modal{background:var(--card);border-radius:20px;width:100%;max-width:380px;padding:22px 20px 28px;position:relative;max-height:90vh;overflow-y:auto}
.we-modal h3{font-size:16px;font-weight:800;margin-bottom:16px;text-align:center}
.we-close{position:absolute;top:14px;right:16px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--sub);line-height:1}
.we-expire-row{display:flex;gap:8px;margin-top:8px}
.we-expire-row .fi{flex:1}

/* ── SORT MODE ── */
.wt-card.dragging{opacity:.4;transform:scale(.97)}
.wt-card.drag-over{outline:2px dashed var(--accent);outline-offset:2px}
.sort-btn{position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.88);border:none;cursor:grab;display:none;align-items:center;justify-content:center;z-index:11;font-size:11px;color:var(--sub);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.sort-mode .sort-btn{display:flex}
.sort-mode-bar{display:none;position:fixed;top:0;left:0;right:0;background:var(--accent);color:#fff;text-align:center;padding:10px;font-size:13px;font-weight:700;z-index:500;max-width:430px;margin:0 auto}
.sort-mode-bar.on{display:block}

/* ── ALERT TOAST ── */
.alert-toast{display:none;position:fixed;bottom:100px;left:50%;transform:translateX(-50%);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:999;min-width:280px;max-width:90vw;overflow:hidden}
.alert-toast.show{display:block}
.alert-c{background:linear-gradient(135deg,#ef4444,#f59e0b);padding:13px 16px;display:flex;align-items:center;gap:10px;border-radius:16px}
.alert-c .al-icon{font-size:20px;flex-shrink:0}
.alert-c .al-title{font-size:13px;font-weight:700;color:#fff}
.alert-c .al-sub{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px}
.alert-c .al-close{margin-left:auto;border:none;background:none;font-size:18px;cursor:pointer;color:#fff;opacity:.85;flex-shrink:0}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:24px;width:50px;height:50px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(108,99,255,.45);display:flex;align-items:center;justify-content:center;z-index:150}

<script>
/* ===== CONSTANTS ===== */
const PLATS=[
  {id:'bomtoon', name:'봄툰',        color:'#ff6b9d',light:'#fff0f5'},
  {id:'ridi',    name:'리디',        color:'#3b82f6',light:'#eff6ff'},
  {id:'lezhin',  name:'레진',        color:'#e84057',light:'#fff0f2'},
  {id:'mbl',     name:'미스터블루',  color:'#5b73e8',light:'#eef1ff'},
  {id:'kakao',   name:'카카오페이지',color:'#f59e0b',light:'#fffbeb'},
  {id:'naver',   name:'네이버',      color:'#03c75a',light:'#e8fff3'},
];
const DAY_ORDER=[1,2,3,4,5,6,0];
const DAY_N={0:'일',1:'월',2:'화',3:'수',4:'목',5:'금',6:'토'};
const DEFEM={bomtoon:'🌸',ridi:'📖',lezhin:'💎',mbl:'📘',kakao:'💬',naver:'🟢'};
const EMOJIS=[
  '📚','📖','✨','🌸','🌟','💜','❤️','🧡','💛','💚','💙','🖤','🤍','💗','💕','🩷','🩵','🩶','🤎','💝',
  '🌙','☀️','🌈','⭐','🔥','💫','🎀','🎭','🗡️','👑','🏹','🌹','🦋','🐉','🐺','🌙','🌛','🌜','🌝','☁️',
  '🐱','🐰','🦊','🐻','🐼','🌺','🍀','🍁','🌊','🏔️','🎪','🎨','🎬','🎵','🎮','🐯','🦁','🐮','🐷','🐸',
  '💎','💍','🗝️','⚔️','🛡️','🪄','🔮','🕯️','🏰','🌃','🌌','🌠','💐','🍓','🍒','🍎','🍇','🍑','🫐','🍋',
  '🦄','🌻','🌷','🥀','🦅','🐬','🐠','🌵','🏖️','🗻','⛩️','🎯','🃏','🧩','🪷','🫧','🌾','🍂','🌿','🍃',
  '🧸','🪆','🎠','🎡','🎢','🎪','🧿','🪬','🔑','🗡️','🪤','🧲','💌','📜','📿','🪩','🕊️','🦢','🦩','🦚',
  '🌍','🌏','🌕','🌑','🌙','💧','❄️','🌪️','🌈','⚡','🌊','🔱','♾️','🔰','⚜️','🏵️','🎖️','🎗️','🎫','🎟️'];

/* ===== STATE ===== */
let wt=JSON.parse(localStorage.getItem('moabom_v5')||'[]');
let curDay=dispDay();
let filter='reading';
let cycleFilter='all';
let editId=null;
let selEm='📚';
let selImg=null;
let thumbType='emoji';
let ctxTargetId=null;

/* ===== TIME ===== */
function dispDay(){const n=new Date();let d=n.getDay();if(n.getHours()>=22)d=(d+1)%7;return d}
function realDay(){return new Date().getDay()}
function todayStr(){const n=new Date();return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`}
function pad(n){return String(n).padStart(2,'0')}
function fmtDate(s){if(!s)return'';const[,m,d]=s.split('-');return`${parseInt(m)}/${parseInt(d)}`}

function getWeekNum(){
  const d=new Date();d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w=new Date(d.getFullYear(),0,4);
  return 1+Math.round(((d-w)/86400000-3+(w.getDay()+6)%7)/7);
}

/* ===== CYCLE ===== */
function nrestActive(w){
  if(!w.cycleN||!w.cycleM||!w.cyclePos)return true;
  const n=+w.cycleN,m=+w.cycleM,tot=n+m;
  const diff=getWeekNum()-(w.cycleSavedWeek||getWeekNum());
  const pos=((+w.cyclePos-1+diff)%tot+tot)%tot+1;
  return pos<=n;
}
function biweekActive(w,tgt){
  if(!w.biweekDate)return true;
  tgt=tgt||new Date();tgt.setHours(0,0,0,0);
  const diff=Math.round((tgt-new Date(w.biweekDate))/86400000);
  return diff>=0&&diff%14===0;
}
function biweekNext(w){
  if(!w.biweekDate)return null;
  const last=new Date(w.biweekDate);last.setHours(0,0,0,0);
  const now=new Date();now.setHours(0,0,0,0);
  let d=new Date(last);while(d<now)d.setDate(d.getDate()+14);
  return d;
}

/* ===== 10day ===== */
function parse10(s){if(!s)return[];return s.split('/').map(x=>parseInt(x.trim())).filter(n=>!isNaN(n)&&n>=1&&n<=31)}

/* ===== RETURN DATE ===== */
function shouldShowReturned(w){return w.status==='on_hold'&&w.returnDate&&w.returnDate<=todayStr()}

/* ===== VISIBILITY ===== */
function isVisible(w,dayIdx){
  if(dayIdx===-1)return true;
  if(!w.days||!w.days.length)return false;
  const has10=w.days.includes('10day');
  const hasDay=w.days.includes(dayIdx);
  if(!hasDay&&!has10)return false;
  if(hasDay){
    if(w.cycleType==='nrest')return nrestActive(w);
    if(w.cycleType==='biweek'){
      const now=new Date();now.setHours(0,0,0,0);
      const tgt=new Date(now);tgt.setDate(tgt.getDate()+((dayIdx-now.getDay()+7)%7));
      return biweekActive(w,tgt);
    }
    return true;
  }
  if(has10){
    const dates=parse10(w.tendayDates);
    if(!dates.length)return true;
    // 탭에서 선택한 요일의 실제 날짜 기준으로 판단
    const tgt=getTabDate(dayIdx);
    return dates.includes(tgt.getDate());
  }
  return false;
}

function getItems(platId){
  const filtered=wt.filter(w=>{
    if(w.platform!==platId)return false;
    const returned=shouldShowReturned(w);
    const eff=returned?'reading':w.status;

    // 전체 탭 - wt 배열 순서 그대로 (전체보기 순서)
    if(curDay===-1){
      const statusOk=filter==='all'||eff===filter;
      if(!statusOk)return false;
      if(cycleFilter==='nrest') return w.cycleType==='nrest';
      if(cycleFilter==='10day') return w.days&&w.days.includes('10day');
      if(cycleFilter==='biweek') return w.cycleType==='biweek';
      return true;
    }

    // 요일 탭
    if(filter==='on_hold') return eff==='on_hold';
    if(filter==='completed') return eff==='completed';
    if(filter==='all'){
      if(eff==='on_hold'||eff==='completed') return true;
      return isVisible(w,curDay);
    }
    if(eff==='on_hold'||eff==='completed') return false;
    return isVisible(w,curDay);
  });

  // 전체 탭: 요일별(월~일) → 10일연재 → 휴재/완결 순
  if(curDay===-1){
    const DAY_ORDER_SORT=[1,2,3,4,5,6,0];
    const seen=new Set();
    const dedup=arr=>arr.filter(w=>{if(seen.has(w.id))return false;seen.add(w.id);return true});
    const byDay=DAY_ORDER_SORT.flatMap(d=>
      filtered.filter(w=>w.days&&w.days.includes(d)&&!w.days.includes('10day')&&w.status!=='on_hold'&&w.status!=='completed')
    );
    const tenday=filtered.filter(w=>w.days&&w.days.includes('10day')&&w.status!=='on_hold'&&w.status!=='completed');
    const holdDone=filtered.filter(w=>w.status==='on_hold'||w.status==='completed');
    return [...dedup(byDay),...dedup(tenday),...dedup(holdDone)];
  }

  // 요일 탭: 10일 연재 맨 앞으로
  return [
    ...filtered.filter(w=>w.days&&w.days.includes('10day')),
    ...filtered.filter(w=>!w.days||!w.days.includes('10day')),
  ];
  return filtered;
}

function initDrag(){
  if(!sortMode) return;
  document.querySelectorAll('.wt-card[data-id]').forEach(card=>{
    card.setAttribute('draggable','true');
    card.addEventListener('dragstart',e=>{
      dragSrcId=card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{
      document.querySelectorAll('.wt-card').forEach(c=>c.classList.remove('dragging','drag-over'));
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      document.querySelectorAll('.wt-card').forEach(c=>c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });
    card.addEventListener('drop',e=>{
      e.preventDefault();
      const targetId=card.dataset.id;
      if(dragSrcId&&targetId&&dragSrcId!==targetId){
        const si=wt.findIndex(w=>w.id===dragSrcId);
        const ti=wt.findIndex(w=>w.id===targetId);
        if(si>=0&&ti>=0){
          const [moved]=wt.splice(si,1);
          wt.splice(ti,0,moved);
          save();renderAll();
          initDrag();
        }
      }
      document.querySelectorAll('.wt-card').forEach(c=>c.classList.remove('drag-over'));
    });
    // 터치 드래그 (모바일)
    let touchY=0,touchX=0;
    card.addEventListener('touchstart',e=>{
      if(!sortMode)return;
      dragSrcId=card.dataset.id;
      touchY=e.touches[0].clientY;
      touchX=e.touches[0].clientX;
      card.classList.add('dragging');
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      if(!sortMode||!dragSrcId)return;
      e.preventDefault();
      const t=e.touches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const target=el&&el.closest('.wt-card[data-id]');
      document.querySelectorAll('.wt-card').forEach(c=>c.classList.remove('drag-over'));
      if(target&&target.dataset.id!==dragSrcId) target.classList.add('drag-over');
    },{passive:false});
    card.addEventListener('touchend',e=>{
      if(!sortMode||!dragSrcId)return;
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const target=el&&el.closest('.wt-card[data-id]');
      if(target&&target.dataset.id&&target.dataset.id!==dragSrcId){
        const si=wt.findIndex(w=>w.id===dragSrcId);
        const ti=wt.findIndex(w=>w.id===target.dataset.id);
        if(si>=0&&ti>=0){
          const [moved]=wt.splice(si,1);
          wt.splice(ti,0,moved);
          save();renderAll();
          initDrag();
        }
      }
      document.querySelectorAll('.wt-card').forEach(c=>c.classList.remove('dragging','drag-over'));
      dragSrcId=null;
    },{passive:true});
  });
}

function getTabDate(dayIdx){
  // 22시 이후면 하루 앞으로 (다음날 기준)
  const now=new Date();
  const base=new Date(now);
  if(now.getHours()>=22) base.setDate(base.getDate()+1);
  base.setHours(0,0,0,0);
  // 이번 주 월요일 구하기 (22시 넘은 일요일이면 다음주 월요일)
  const dayOfWeek=base.getDay();
  const monday=new Date(base);
  monday.setDate(base.getDate()-((dayOfWeek+6)%7));
  // 요일별 offset: 1=월(0), 2=화(1) ... 0=일(6)
  const offsetMap={1:0,2:1,3:2,4:3,5:4,6:5,0:6};
  const tgt=new Date(monday);
  tgt.setDate(monday.getDate()+offsetMap[dayIdx]);
  return tgt;
}

}

        thumbInner=`<img src="${w.image}" alt="${esc(w.title)}">`;
      } else {
        thumbInner=w.emoji||DEFEM[p.id]||'📚';
      }

      // top-left badge
      const has10=w.days&&w.days.includes('10day');
      const returned=shouldShowReturned(w);
      let tlBadge='';
      if(w.status==='completed'){
        tlBadge=`<span class="tl-badge badge-done">[완결]</span>`;
      } else if(w.status==='on_hold'&&!returned){
        const rd=w.returnDate?` ~${fmtDate(w.returnDate)}`:'';

      } else if(returned){
        tlBadge=`<span class="tl-badge badge-return">[복귀↑]</span>`;

        const dates=w.tendayDates?`(${w.tendayDates})`:'';
        tlBadge=`<span class="tl-badge badge-10day">10일 ${dates}</span>`;
      } else if(w.cycleType==='nrest'&&w.cycleN&&w.cycleM){
        tlBadge=`<span class="tl-badge badge-nrest">${w.cycleN}연${w.cycleM}휴</span>`;
      } else if(w.cycleType==='biweek'){
        const nd=biweekNext(w);

        tlBadge=`<span class="tl-badge badge-nrest">격주${ns}</span>`;

          <div class="wt-title">${esc(w.title)}</div>
          <div class="wt-bottom">
            <span class="wt-last">${lastTxt}</span>
            <button class="ep-inc" onclick="event.stopPropagation();incEp('${w.id}')">+1화</button>
          </div>
        </div>

function doRestore(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const obj=JSON.parse(ev.target.result);
      const imported=obj.data||obj;
      if(!Array.isArray(imported))throw new Error('형식 오류');
      if(confirm(`${imported.length}개 작품을 불러옵니다. 현재 데이터를 덮어쓸까요?`)){
        wt=imported;save();renderAll();alert('불러오기 완료!');
      }
    }catch{alert('백업 파일을 읽을 수 없습니다')}
  };
  r.readAsText(file);
  e.target.value='';
}

  document.getElementById('modal').classList.add('open');
}

function openEdit(id){
  const w=wt.find(x=>x.id===id);if(!w)return;
  editId=id;
  selEm=w.emoji||DEFEM[w.platform]||'📚';
  selImg=w.image||null;
  thumbType=w.thumbType||'emoji';
  document.getElementById('modalH').textContent='작품 수정';
  document.getElementById('mtabs').style.display='none';
  document.getElementById('tabS').style.display='block';
  document.getElementById('tabB').style.display='none';
  document.getElementById('platFg').style.display='none';

  // thumb type
  document.querySelectorAll('.tt-btn').forEach(b=>b.classList.remove('on'));
  const ttbtn=document.querySelector(`.tt-btn:${thumbType==='image'?'last-child':'first-child'}`);
  if(ttbtn)ttbtn.classList.add('on');
  document.getElementById('thumbEmoji').style.display=thumbType==='emoji'?'block':'none';
  document.getElementById('thumbImage').style.display=thumbType==='image'?'block':'none';

  document.getElementById('emDisp').textContent=selEm;
  document.getElementById('emCustomIn').value=selEm;
  document.getElementById('emGrid').classList.remove('open');
  if(selImg){
    document.getElementById('imgPreview').src=selImg;
    document.getElementById('imgPreview').style.display='block';
  }

  document.getElementById('titleIn').value=w.title;
  document.getElementById('epIn').value=w.episode;
  document.getElementById('memoIn').value=w.memo||'';
  document.getElementById('statusIn').value=w.status;
  document.getElementById('returnDate').value=w.returnDate||'';
  document.getElementById('returnSec').classList.toggle('show',w.status==='on_hold');

  // days - radio
  document.querySelectorAll('[name="daySel"]').forEach(r=>r.checked=false);
  if(w.days&&w.days.length>0){
    const dv=w.days[0];
    const val=dv==='10day'?'10day':String(dv);
    const r=document.querySelector(`[name="daySel"][value="${val}"]`);
    if(r)r.checked=true;
  }
  document.getElementById('tendaySec').classList.toggle('show',!!(w.days&&w.days.includes('10day')));
  document.getElementById('tendayIn').value=w.tendayDates||'';
  refreshDayConstraints();

  document.getElementById('cycleType').value=w.cycleType||'';
  document.getElementById('cycleN').value=w.cycleN||'';
  document.getElementById('cycleM').value=w.cycleM||'';
  document.getElementById('cyclePos').value=w.cyclePos||'';
  document.getElementById('biweekDate').value=w.biweekDate||'';
  document.getElementById('cycleSec').classList.toggle('show',w.cycleType==='nrest');
  document.getElementById('biweekSec').classList.toggle('show',w.cycleType==='biweek');
  updateCyclePreview();
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('emGrid').classList.remove('open');editId=null}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});

function stab(t,btn){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('tabS').style.display=t==='single'?'block':'none';
  document.getElementById('tabB').style.display=t==='bulk'?'block':'none';
}

function resetForm(){
  document.getElementById('titleIn').value='';
  document.getElementById('epIn').value='1';
  document.getElementById('memoIn').value='';
  document.getElementById('statusIn').value='reading';
  document.getElementById('returnDate').value='';
  document.getElementById('returnSec').classList.remove('show');
  document.getElementById('tendayIn').value='';
  document.getElementById('tendaySec').classList.remove('show');
  document.getElementById('cycleType').value='';
  document.getElementById('cycleN').value='';
  document.getElementById('cycleM').value='';
  document.getElementById('cyclePos').value='';
  document.getElementById('biweekDate').value='';
  document.getElementById('cycleSec').classList.remove('show');
  document.getElementById('biweekSec').classList.remove('show');
  document.getElementById('cyclePreview').textContent='';
  document.querySelectorAll('[name="plat"]').forEach(r=>r.checked=false);
  document.querySelectorAll('[name="daySel"]').forEach(r=>r.checked=false);
  document.getElementById('emDisp').textContent='📚';
  document.getElementById('emCustomIn').value='';
  document.getElementById('emGrid').classList.remove('open');
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgPreview').src='';
  selEm='📚';selImg=null;
}

/* ===== THUMB TYPE ===== */
function setThumbType(t,btn){
  thumbType=t;
  document.querySelectorAll('.tt-btn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('thumbEmoji').style.display=t==='emoji'?'block':'none';
  document.getElementById('thumbImage').style.display=t==='image'?'block':'none';
}

function onImgFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    selImg=ev.target.result;
    const prev=document.getElementById('imgPreview');
    prev.src=selImg;prev.style.display='block';
  };
  r.readAsDataURL(file);
}

/* ===== DAY CONSTRAINTS (radio - 1개만) ===== */
function onDayChange(cb){
  const is10=cb.value==='10day';
  document.getElementById('tendaySec').classList.toggle('show',is10&&cb.checked);
}

function refreshDayConstraints(){
  const sel=document.querySelector('[name="daySel"]:checked');
  const is10=sel&&sel.value==='10day';
  document.getElementById('tendaySec').classList.toggle('show',!!is10);
}

function onStatusChange(){
  document.getElementById('returnSec').classList.toggle('show',document.getElementById('statusIn').value==='on_hold');
}

function onCycleChange(){
  const v=document.getElementById('cycleType').value;
  document.getElementById('cycleSec').classList.toggle('show',v==='nrest');
  document.getElementById('biweekSec').classList.toggle('show',v==='biweek');
  updateCyclePreview();
}

function updateCyclePreview(){
  const n=+document.getElementById('cycleN').value;
  const m=+document.getElementById('cycleM').value;
  const pos=+document.getElementById('cyclePos').value;
  const el=document.getElementById('cyclePreview');
  if(!n||!m||!pos){el.textContent='';return}
  const tot=n+m,isOn=pos<=n,left=isOn?(n-pos+1):(tot-pos+1);
  el.textContent=`현재 ${pos}주차 → ${isOn?`연재 중 (${left}주 후 휴재)`:`휴재 중 (${left}주 후 연재)`}`;
}

/* ===== EMOJI ===== */
function buildEmGrid(){
  document.getElementById('emGrid').innerHTML=EMOJIS.map(e=>`<button class="em-opt" onclick="pickEm('${e}')">${e}</button>`).join('');
}
function toggleEm(){document.getElementById('emGrid').classList.toggle('open')}
function pickEm(e){
  selEm=e;document.getElementById('emDisp').textContent=e;
  document.getElementById('emCustomIn').value=e;
  document.querySelectorAll('.em-opt').forEach(b=>b.classList.toggle('sel',b.textContent===e));
  document.getElementById('emGrid').classList.remove('open');
}
function onEmCustom(inp){
  // 이모지는 유니코드 코드포인트 단위로 파싱 (피부톤 등 조합 이모지 지원)
  const segs=[...new Intl.Segmenter('en',{granularity:'grapheme'}).segment(inp.value)];
  const v=segs.map(s=>s.segment).join('').trim();
  if(!v)return;
  selEm=v;
  document.getElementById('emDisp').textContent=v;
  document.querySelectorAll('.em-opt').forEach(b=>b.classList.toggle('sel',b.textContent===v));
}

/* ===== BULK ===== */
function buildBulkIn(){
  document.getElementById('bulkIn').innerHTML=[
    ...DAY_ORDER.map(i=>`<div><label class="fl">${DAY_N[i]}요일</label><textarea class="ba" id="bk${i}" rows="2" placeholder="${DAY_N[i]}요일 작품 (줄바꿈 구분)"></textarea></div>`),
    `<div><label class="fl">10일 연재</label><textarea class="ba" id="bk10day" rows="2" placeholder="10일 연재 작품"></textarea></div>`
  ].join('');
}

/* ===== SAVE ===== */
function saveW(){
  const isBulk=document.getElementById('tabB').style.display!=='none'&&editId===null;
  if(isBulk){
    const bp=document.querySelector('[name="bp"]:checked');
    if(!bp){alert('플랫폼을 선택해주세요');return}
    let added=0;
    [...DAY_ORDER,'10day'].forEach(dv=>{
      const ta=document.getElementById(`bk${dv}`);
      if(!ta||!ta.value.trim())return;
      ta.value.trim().split('\n').forEach(t=>{
        t=t.trim();if(!t)return;
        wt.push({id:gid(),title:t,platform:bp.value,days:[dv],status:'reading',episode:1,emoji:'📚',thumbType:'emoji'});
        added++;
      });
    });
    if(!added){alert('작품을 입력해주세요');return}
    save();renderAll();
    // bulk 저장 후 초기화
    document.querySelectorAll('[name="bp"]').forEach(r=>r.checked=false);
    [...DAY_ORDER,'10day'].forEach(dv=>{
      const ta=document.getElementById(`bk${dv}`);
      if(ta)ta.value='';
    });
    closeModal();return;
  }

  const title=document.getElementById('titleIn').value.trim();
  if(!title){alert('작품 제목을 입력해주세요');return}
  // radio로 단일 요일
  const dayRadio=document.querySelector('[name="daySel"]:checked');
  const days=dayRadio?(dayRadio.value==='10day'?['10day']:[parseInt(dayRadio.value)]):[];
  const tendayDates=days.includes('10day')?document.getElementById('tendayIn').value.trim():'';
  const cycleType=document.getElementById('cycleType').value;
  const cycleN=cycleType==='nrest'?document.getElementById('cycleN').value:'';
  const cycleM=cycleType==='nrest'?document.getElementById('cycleM').value:'';
  const cyclePos=cycleType==='nrest'?document.getElementById('cyclePos').value:'';
  const biweekDate=cycleType==='biweek'?document.getElementById('biweekDate').value:'';
  const ep=parseInt(document.getElementById('epIn').value)||1;
  const status=document.getElementById('statusIn').value;
  const returnDate=status==='on_hold'?document.getElementById('returnDate').value:'';
  const memo=document.getElementById('memoIn').value.trim();
  const image=thumbType==='image'?selImg:null;
  const emoji=thumbType==='emoji'?selEm:'📚';

  if(editId){
    const i=wt.findIndex(w=>w.id===editId);if(i<0)return;
    wt[i]={...wt[i],title,days,status,episode:ep,emoji,thumbType,image,
      tendayDates,cycleType,cycleN,cycleM,cyclePos,biweekDate,returnDate,memo,
      cycleSavedWeek:cycleType==='nrest'?getWeekNum():undefined};
  } else {
    const pr=document.querySelector('[name="plat"]:checked');
    if(!pr){alert('플랫폼을 선택해주세요');return}
    wt.push({id:gid(),title,platform:pr.value,days,status,episode:ep,emoji,thumbType,image,
      tendayDates,cycleType,cycleN,cycleM,cyclePos,biweekDate,returnDate,memo,
      cycleSavedWeek:cycleType==='nrest'?getWeekNum():undefined});
  }
  save();renderAll();closeModal();
}

/* ===== SUMMARY MODAL ===== */
let sumPlatId=null;

function openSummary(platId){
  sumPlatId=platId||PLATS[0].id;
  renderSumTabs();
  renderSumBody();
  document.getElementById('sumOverlay').classList.add('open');
}
function closeSummary(){document.getElementById('sumOverlay').classList.remove('open')}
document.getElementById('sumOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('sumOverlay'))closeSummary()});

function renderSumTabs(){
  const tabs=document.getElementById('sumPlatTabs');
  tabs.innerHTML=PLATS.map(p=>{
    const on=p.id===sumPlatId;
    return`<button class="spt${on?' on':''}" style="${on?`background:${p.color}`:'color:var(--sub)'}" onclick="sumSelPlat('${p.id}')">${p.name}</button>`;
  }).join('');
}

function sumSelPlat(pid){sumPlatId=pid;renderSumTabs();renderSumBody()}

function renderSumBody(){
  const body=document.getElementById('sumBody');
  const platWt=wt.filter(w=>w.platform===sumPlatId);
  if(!platWt.length){body.innerHTML=`<div style="text-align:center;padding:30px;color:var(--sub);font-size:13px">등록된 작품이 없어요</div>`;return}

  const sections=[];
  // 요일별 - 휴재/완결 제외
  DAY_ORDER.forEach(dayIdx=>{
    const items=platWt.filter(w=>
      w.days&&w.days.includes(dayIdx)&&!w.days.includes('10day')
      &&w.status!=='on_hold'&&w.status!=='completed'
    );
    if(items.length) sections.push({label:`${DAY_N[dayIdx]}요일`,items,key:dayIdx});
  });
  // 10일 연재 - 휴재/완결 제외
  const tenItems=platWt.filter(w=>w.days&&w.days.includes('10day')&&w.status!=='on_hold'&&w.status!=='completed');
  if(tenItems.length) sections.push({label:'10일 연재',items:tenItems,key:'10day'});
  // 휴재 및 완결만
  const specialItems=platWt.filter(w=>w.status==='on_hold'||w.status==='completed');
  if(specialItems.length) sections.push({label:'휴재 및 완결',items:specialItems,key:'special'});

  body.innerHTML=sections.map(sec=>{
    if(!sec.items.length)return'';
    const rows=sec.items.map(w=>{
      const returned=shouldShowReturned(w);
      let badge='';
      const has10=w.days&&w.days.includes('10day');
      if(w.status==='completed') badge=`<span class="sum-item-badge sib-done">완결</span>`;
      else if(w.status==='on_hold'&&!returned){
        const rd=w.returnDate?` ~${fmtDate(w.returnDate)}`:'';
        badge=`<span class="sum-item-badge sib-hold">휴재${rd}</span>`;
      } else if(returned) badge=`<span class="sum-item-badge sib-return">복귀↑</span>`;
      else if(has10&&w.tendayDates) badge=`<span class="sum-item-badge sib-10day">10일 (${w.tendayDates})</span>`;
      else if(w.cycleType==='nrest'&&w.cycleN&&w.cycleM) badge=`<span class="sum-item-badge sib-nrest">${w.cycleN}연${w.cycleM}휴</span>`;

      // 휴재/완결 섹션에서는 요일 prefix 표시
      const dayPfx=sec.key==='special'&&w.days&&w.days.length
        ?`<span class="sum-item-day">[${w.days[0]==='10day'?'10일':DAY_N[w.days[0]]}]</span>`:'';

      return`<div class="sum-item">
        <div class="sum-item-left">
          ${dayPfx}<span class="sum-item-name">${esc(w.title)}</span>
        </div>
        ${badge}
      </div>`;
    }).join('');
    return`<div class="sum-day-sec">
      <div class="sum-day-lbl">${sec.label}<span class="sum-day-cnt">${sec.items.length}개</span></div>
      <div class="sum-list">${rows}</div>
    </div>`;
  }).join('');
}

/* ===== UTILS ===== */
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function save(){localStorage.setItem('moabom_v5',JSON.stringify(wt))}

/* ===== AUTO REFRESH 22:00 ===== */
function schedRefresh(){
  const now=new Date(),next=new Date(now);
  next.setHours(22,0,5,0);if(now>=next)next.setDate(next.getDate()+1);
  setTimeout(()=>{
    curDay=dispDay();renderTabs();renderAll();
    schedRefresh();
  },next-now);
}

filter=curDay===-1?'all':'reading';
init();
if(curDay===-1){
  const cfIcon=document.getElementById('cfIconBtn');
  if(cfIcon) cfIcon.style.display='flex';
}
schedRefresh();

}
